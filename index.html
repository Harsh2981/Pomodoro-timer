<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Pomodoro</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        /* --- TIMER DISPLAY --- */
        #timer-display {
            font-size: 14rem; 
            font-weight: 900;
            margin: 0;
            line-height: 1;
            letter-spacing: -8px;
        }

        .session-info {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            opacity: 0.8;
        }

        /* --- CONTROL BUTTONS --- */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .glass-island {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .glass-island:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .settings {
            margin-top: 40px;
            display: flex;
            gap: 10px;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 100px;
            text-align: center;
            outline: none;
        }

        /* --- MUSIC ISLAND (Bottom Right) --- */
        .music-island {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 240px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .music-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        .music-btn {
            background: rgba(255, 255, 255, 0.15);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s;
        }

        .music-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* --- BG SWITCHER (Bottom Left) --- */
        #bg-switcher {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-weight: bold;
        }

        @media (max-width: 768px) {
            #timer-display { font-size: 7rem; letter-spacing: -2px; }
            .music-island { display: none; }
        }
    </style>
</head>
<body>

    <div class="session-info">Session: <span id="session-count">0</span></div>
    <h1 id="timer-display">25:00</h1>

    <div class="controls">
        <button class="glass-island" onclick="startTimer()">Start</button>
        <button class="glass-island" onclick="pauseTimer()">Pause</button>
        <button class="glass-island" onclick="resetTimer()">Reset</button>
    </div>

    <div class="settings">
        <input type="number" id="user-minutes" class="glass-input" placeholder="Mins">
        <button class="glass-island" style="padding: 12px 20px;" onclick="setCustomTime()">Set</button>
    </div>

    <button id="bg-switcher" onclick="changeBackground()">🖼️ Switch Scene</button>

    <div class="music-island">
        <div id="track-label" style="font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; margin-bottom: 8px; opacity: 0.8;">ALPHA WAVES</div>
        <div class="music-controls">
            <button class="music-btn" onclick="prevTrack()">⏮</button>
            <button class="music-btn" id="play-pause-btn" onclick="toggleMusic()">▶</button>
            <button class="music-btn" onclick="nextTrack()">⏭</button>
            <button class="music-btn" id="repeat-btn" onclick="toggleRepeat()" style="opacity: 0.5;">🔁</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
