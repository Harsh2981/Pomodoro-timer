<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Pomodoro</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        /* --- STATS ISLAND --- */
        .stats-island {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 20px;
        }

        .stat-box { text-align: left; }
        .stat-label { font-size: 0.65rem; opacity: 0.7; letter-spacing: 2px; margin-bottom: 4px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; font-variant-numeric: tabular-nums; }

        #reset-stats-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.3s;
            line-height: 1;
        }
        #reset-stats-btn:hover { background: rgba(255, 240, 240, 0.3); transform: rotate(90deg); }

        /* --- TIMER DISPLAY --- */
        #timer-display {
            font-size: 14rem; 
            font-weight: 900;
            margin: 0;
            line-height: 0.9;
            letter-spacing: -8px;
        }

        /* --- CONTROL BUTTONS --- */
        .controls {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .glass-island {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 30px;
            font-size: 0.9rem;
            font-weight: bold;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .glass-island:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .break-btn { background: rgba(100, 255, 100, 0.15); }

        .settings {
            margin-top: 40px;
            display: flex;
            gap: 10px;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 90px;
            text-align: center;
            outline: none;
        }

        /* --- MUSIC ISLAND --- */
        .music-island {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 240px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 25px;
        }

        .music-controls { display: flex; justify-content: center; align-items: center; gap: 12px; margin-top: 10px; }
        .music-btn { background: rgba(255, 255, 255, 0.15); border: none; color: white; padding: 10px; border-radius: 12px; cursor: pointer; }

        #bg-switcher {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-weight: bold;
        }

        @media (max-width: 768px) {
            #timer-display { font-size: 7rem; letter-spacing: -2px; }
            .music-island, .stats-island { display: none; }
        }
    </style>
</head>
<body>

    <div class="stats-island">
        <div class="stat-box">
            <div class="stat-label">FOCUS TIME</div>
            <div id="focus-total" class="stat-value">0m 0s</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">BREAK TIME</div>
