<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cozy Pomodoro</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            transition: background-image 0.8s ease-in-out;
            background-size: cover;
            background-position: center;
            color: white;
            text-align: center;
        }

        /* --- MASSIVE TIMER --- */
        #timer-display {
            font-size: 14rem; 
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
            letter-spacing: -8px;
        }

        .session-info {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            opacity: 0.8;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        /* --- GLASS ISLAND BUTTONS --- */
        .controls {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .glass-island {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 35px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .glass-island:hover {
            transform: translateY(-8px) scale(1.05);
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 15px 45px rgba(0,0,0,0.4);
        }

        /* --- SETTINGS ISLAND --- */
        .settings {
            margin-top: 40px;
            display: flex;
            gap: 10px;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 12px;
            border-radius: 12px;
            color: white;
            width: 100px;
            text-align: center;
            font-size: 1rem;
            outline: none;
        }

        #bg-switcher {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 18px;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            font-size: 0.8rem;
        }

        @media (max-width: 768px) {
            #timer-display { font-size: 8rem; letter-spacing: -2px; }
            .controls { flex-wrap: wrap; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="session-info">Session: <span id="session-count">0</span></div>
    <h1 id="timer-display">25:00</h1>

    <div class="controls">
        <button class="glass-island" onclick="startTimer()">Start</button>
        <button class="glass-island" onclick="pauseTimer()">Pause</button>
        <button class="glass-island" onclick="resetTimer()">Reset</button>
    </div>

    <div class="settings">
        <input type="number" id="user-minutes" class="glass-input" placeholder="Mins">
        <button class="glass-island" style="padding: 12px 20px;" onclick="setCustomTime()">Set</button>
    </div>

    <button id="bg-switcher" onclick="changeBackground()">🖼️ Switch Scene</button>

    <script src="script.js"></script>
</body>
</html>
